name: nakama-tictactoe

runtime:
  path: "/nakama/data/modules"
  entrypoint: "index.js"
  http_key: "defaultkey"

console:
  port: 7351
  username: "admin"
  password: "password"

socket:
  port: 7350
  max_message_size_bytes: 4096

match:
  max_empty_sec: 0
  label_update_interval_sec: 1

matchmaker:
  max_tickets: 2
  interval_sec: 3
  max_intervals: 2
