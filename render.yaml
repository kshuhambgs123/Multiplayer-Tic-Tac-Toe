services:
  # 1. The React Frontend (Static Site - Free)
  - type: web
    name: lila-web-client
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: npx serve -s frontend/dist -p $PORT
    envVars:
      - key: VITE_NAKAMA_HOST
        fromService:
          type: web
          name: lila-nakama
          property: host
      - key: VITE_NAKAMA_PORT
        value: "443"
      - key: VITE_NAKAMA_USE_SSL
        value: "true"
      - key: VITE_NAKAMA_SERVER_KEY
        value: "defaultkey"

  # 2. The Nakama Backend Server (Docker Web Service - Free)
  - type: web
    name: lila-nakama
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "7350"
      - key: DB_HOST
        fromDatabase:
          name: lila-db
          property: host
      - key: DB_USER
        fromDatabase:
          name: lila-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: lila-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: lila-db
          property: database
      - key: DB_PORT
        fromDatabase:
          name: lila-db
          property: port
      - key: NAKAMA_CONSOLE_PASSWORD
        generateValue: true

databases:
  # 3. The PostgreSQL Instance (Free)
  - name: lila-db
    databaseName: nakama
    plan: free
