services:
  # 1. The React Frontend (Static Site - Free)
  - type: web
    name: lila-web-client
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: npx serve -s frontend/dist -p $PORT
    envVars:
      - key: VITE_NAKAMA_HOST
        value: lila-nakama.onrender.com
      - key: VITE_NAKAMA_PORT
        value: "443"
      - key: VITE_NAKAMA_USE_SSL
        value: "true"
      - key: VITE_NAKAMA_SERVER_KEY
        value: "defaultkey"

  # 2. The Nakama Backend Server (Docker Web Service - Free)
  - type: web
    name: lila-nakama
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "7350"
      - key: NAKAMA_DATABASE_ADDRESS
        fromDatabase:
          name: lila-db
          property: connectionString
      - key: NAKAMA_DATABASE_DRIVER
        value: "postgres"
      - key: NAKAMA_SOCKET_PORT
        value: "7350"
      - key: NAKAMA_RUNTIME_PATH
        value: "/nakama/data/modules"
      - key: NAKAMA_RUNTIME_HTTP_KEY
        value: "defaultkey"
      - key: NAKAMA_CONSOLE_PORT
        value: "7351"
      - key: NAKAMA_CONSOLE_USERNAME
        value: "admin"
      - key: NAKAMA_CONSOLE_PASSWORD
        generateValue: true
      - key: NAKAMA_MATCH_MAX_EMPTY_SEC
        value: "0"
      - key: NAKAMA_MATCHMAKER_MAX_TICKETS
        value: "2"
      - key: NAKAMA_SESSION_TOKEN_EXPIRY_SEC
        value: "7200"

databases:
  # 3. The PostgreSQL Instance (Free)
  - name: lila-db
    databaseName: nakama
    plan: free
