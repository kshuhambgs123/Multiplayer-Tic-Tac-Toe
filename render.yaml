services:
  # 1. The React Frontend
  - type: web
    name: lila-frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: npx serve -s frontend/dist -p $PORT
    envVars:
      - key: VITE_NAKAMA_HOST
        fromService:
          type: web
          name: lila-nakama
          env: RENDER_EXTERNAL_HOSTNAME
      - key: VITE_NAKAMA_PORT
        value: "443"
      - key: VITE_NAKAMA_USE_SSL
        value: "true"
      - key: VITE_NAKAMA_SERVER_KEY
        value: "defaultkey"

  # 2. The Nakama Backend Server
  - type: web
    name: lila-nakama
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    startCommand: "run --database.address \"$DATABASE_URL\" --session.token_expiry_sec 7200"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lila-db
          property: connectionString
      - key: NAKAMA_CONSOLE_PASSWORD
        generateValue: true

databases:
  # 3. The PostgreSQL Instance
  - name: lila-db
    databaseName: nakama
    user: postgres
    plan: free
